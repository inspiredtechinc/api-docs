<!DOCTYPE html>
<html>
<head>
  <title>API Docs</title>
  <style>
    body { font-family: sans-serif; margin: 2em; background: #f7f7f7; color: #222; }
    .env-group { display: flex; gap: 2em; margin-top: 2em; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 1.5em; min-width: 180px; box-shadow: 0 2px 8px #eee; background: #fafbfc; }
    .card h2 { margin-top: 0; }
    .card ul { list-style: none; padding: 0; }
    .card li { margin: 0.5em 0; }
    a { text-decoration: none; color: #0074d9; }
    a:hover { text-decoration: underline; }
    @media (prefers-color-scheme: dark) { body { background: #181a1b; color: #eee; } .card { background: #23272a; border-color: #444; } a { color: #66baff; } }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <h1>API Documentation</h1>
</body>
</html>
