name: preview

on:
  pull_request:
    branches:
      - 'feature/**'

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Set GITHUB_EVENT_NAME env
        run: echo "GITHUB_EVENT_NAME=pull_request" >> $GITHUB_ENV
      - name: Generate documentation
        run: npm run generate-docs
      - name: Add .nojekyll
        run: touch preview/.nojekyll
      - name: Deploy to GitHub Pages (PR Preview)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./preview
          publish_branch: gh-pages
          destination_dir: preview/pr-${{ github.event.pull_request.number }}
      - name: Comment PR with Preview Link
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const url = `https://${owner}.github.io/${repo}/preview/pr-${prNumber}/`;
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner,
              repo,
              body: `🚀 **Preview your API docs here:**\n\n👉 [PR Preview](${url})`
            });
