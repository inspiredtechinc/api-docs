    body {

      color: #333;

    header {
      background-color: #4CAF50;

    .content {
      margin: 1rem auto;
      max-width: 800px;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .card {
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 1rem;
      background-color: white;
      flex: 1 1 calc(33.333% - 1rem);
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    .card a {
      color: #4CAF50;
      text-decoration: none;
    }
    .card a:hover {
      text-decoration: underline;
    }
  </style>
</head>
