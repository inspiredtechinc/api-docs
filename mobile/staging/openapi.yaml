          description: All bookings for the authenticated user
          schema:
            type: object
            description: Paginated response containing a list of bookings.
            properties: &ref_49
              success:
                type: boolean
                description: Indicates if the request was successful.
                example: true
              data:
                type: array
                description: List of booking objects.
                items:
                  type: object
                  properties: &ref_2
                    id:
                      type: string
                      example: bkg_001
                    listing_id:
                      type: string
                      example: lst_101
                    user_id:
                      type: string
                      example: usr_201
                    check_in:
                      type: string
                      format: date-time
                      example: '2025-06-01T14:00:00Z'
                    check_out:
                      type: string
                      format: date-time
                      example: '2025-06-05T11:00:00Z'
                    amount:
                      type: number
                      format: float
                      example: 500
                    rating:
                      type: number
                      format: float
                      example: 4.5
                    days:
                      type: integer
                      example: 4
                    payment_id:
                      type: string
                      example: pay_001
                    status:
                      type: string
                      enum:
                        - pending
                        - accepted
                        - rejected
                        - cancelled
                        - completed
                        - awaiting_payment
                      example: pending
                    guests:
                      type: integer
                      example: 2
                example:
                  - id: bkg_001
                    listing_id: lst_101
                    user_id: usr_201
                    check_in: '2025-06-01T14:00:00Z'
                    check_out: '2025-06-05T11:00:00Z'
                    amount: 500
                    rating: 4.5
                    days: 4
                    payment_id: pay_001
                    status: pending
                    guests: 2
              meta:
                type: object
                description: Pagination metadata.
                properties:
                  page:
                    type: integer
                    description: Current page number
                    example: 1
                  limit:
                    type: integer
                    description: Number of items per page
                    example: 10
                  total:
                    type: integer
                    description: Total number of items
                    example: 25
                  pages:
                    type: integer
                    description: Total number of pages
                    example: 3
                required:
                  - page
                  - limit
                  - total
                  - pages
              toast:
                type: string
                description: Optional toast message for the client UI.
                example: Bookings retrieved successfully.
              error:
                type: string
                description: Error message, if any.
                example: null
            required: &ref_50
              - success
              - data
              - meta
        '400':
          description: Bad request (invalid parameters)
          schema:
            type: object
            description: Standard error response model for failed requests.
            properties: &ref_0
              success:
                type: boolean
                description: Indicates if the request was successful.
                example: false
              error:
                type: string
                description: Error message describing the failure.
                example: Invalid booking ID.
              toast:
                type: string
                description: Optional toast message for the client UI.
                example: Unable to process your request.
            required: &ref_1
              - success
              - error
        '401':
