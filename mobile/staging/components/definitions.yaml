definitions:
  DefaultResponse:
    type: object
    description: Standard error response model for failed requests.
    properties:
      success:
        type: boolean
        description: Indicates if the request was successful.
        example: false
      error:
        type: string
        description: Error message describing the failure.
        example: "Invalid booking ID."
      toast:
        type: string
        description: Optional toast message for the client UI.
        example: "Unable to process your request."
    required:
      - success
      - error
  DashboardResponse:
    type: object
    properties:
      status:
        type: string
        example: ok
      data:
        type: object
        description: Optional data payload for successful responses
    required:
      - status
  DashboardError:
    type: object
    properties:
      status:
        type: string
        example: error
      error:
        type: object
        properties:
          code:
            type: integer
            example: 400
          message:
            type: string
            example: Invalid request
    required:
      - status
      - error
  Error404Response:
    type: object
    properties:
      code:
        type: integer
        example: 404
      message:
        type: string
        example: Not found
    required:
      - code
      - message
  OTPRequest:
    type: object
    properties:
      contact:
        type: string
        maxLength: 10
        description: The contact number or email or any other supported contact method
  OTPRequiredResponse:
    type: object
    properties:
      success:
        type: boolean
        example: false
      error:
        type: string
        example: "User registration contact not verified. OTP required."
      toast:
        type: string
        example: "Please verify your registration contact before proceeding."
      data:
        type: object
        properties:
          otp_required:
            type: boolean
            example: true
  User:
    type: object
    properties:
      id:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      email:
        type: string
      bio:
        type: string
      avatar:
        type: string
        format: uri
      phone:
        type: string
      birthday:
        type: string
        format: date-time
      city:
        type: string
      country:
        type: string
        maxItems: 10
      interests:
        type: array
        items:
          type: string
        maxItems: 10
      languages:
        type: array
        items:
          type: string
        maxItems: 10
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time
      gender:
        $ref: '#/definitions/Gender'
  UserSummary:
    type: object
    properties:
      id:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      email:
        type: string
      phone:
        type: string
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time
  Gender:
    type: string
    enum:
      - Male
      - Female
      - Non-binary
      - Transgender
      - Genderqueer
      - Genderfluid
      - Agender
      - Two-spirit
      - Bigender
      - Other
      - Prefer not to say
  Location:
    type: object
    properties:
      latitude:
        type: number
        format: double
      longitude:
        type: number
        format: double
  Address:
    type: object
    properties:
      street:
        type: string
      city:
        type: string
      country:
        type: string
      postal_code:
        type: string
      province:
        type: string
      unit_number:
        type: string
      flag:
        type: string
    required:
      - street
      - city
      - country
      - postal_code
  PendingVerification:
    type: object
    properties:
      id:
        type: string
        example: "1"
      name:
        type: string
        example: "Alice"
      lastName:
        type: string
        example: "Johnson"
      email:
        type: string
        format: email
        example: "alice.johnson@example.com"
      idType:
        type: string
        example: "Driver's License"
      idDocumentUrl:
        type: string
        format: uri
        example: "https://example.com/id-docs/alice.jpg"
      selfieUrl:
        type: string
        format: uri
        example: "https://example.com/selfies/alice.jpg"
      phone:
        type: string
        example: "+1-555-123-4567"
      socialMedia:
        type: string
        format: uri
        example: "https://instagram.com/alicej"
      status:
        type: string
        enum: [pending, approved, rejected]
        example: "pending"
      submittedAt:
        type: string
        format: date-time
        example: "2024-12-01T10:30:00Z"
      role:
        type: string
        example: "host"
  Host:
    type: object
    properties:
      id:
        type: string
      first_name:
        type: string
      avatar:
        type: string
        format: uri
      gender:
       type: string
      rating:
        type: number
        format: double
  ListingRequest:
    type: object
    properties:
      title:
        type: string
      description:
        type: string
      price:
        type: number
        format: double
      thumbnail:
        type: string
        format: uri
      max_guests:
        type: integer
        format: int32
      instant_book:
        type: boolean
      photos:
        type: array
        items:
          type: string
          format: uri
          minimum: 3
        maxItems: 10
      host:
        $ref: '#/definitions/Host'
      amenities:
        type: array
        items:
          type: string
        maxLength: 20
      house_rules:
        type: array
        items:
          type: string
        maxLength: 5
      cancellation_policy:
        type: string
        enum:
          - "No refunds"
          - "50% - 50% refund"
          - "100% - Full Refund"
      address:
        $ref: '#/definitions/Address'
      baggage_drop:
        type: boolean
        description: Baggage drop allowed by host so guests can drop off their bags first while they explore the city.
        default: false
      category:
        type: object
        properties:
          name:
            type: string
          code:
            type: string
          description:
            type: string
    required:
      - title
      - description
      - price
      - thumbnail
      - max_guests
      - instant_book
      - photos
      - host
      - amenities
      - house_rules
      - cancellation_policy
      - address
      - category
  ListingSummary:
    type: object
    properties:
      id:
        type: string
      title:
        type: string
      description:
        type: string
      location:
        $ref: '#/definitions/Location'
      price:
        type: number
        format: double
      available:
        type: boolean
      thumbnail:
        type: string
        format: uri
      distance:
        type: number
        format: double
      created_at:
        type: string
        format: date-time
      max_guests:
        type: integer
        format: int32
      rating:
        type: number
        format: double
      instant_book:
        type: boolean
      active:
        type: boolean
      amenities:
        type: array
        items:
          type: string
      cancellation_policy:
        type: string
      category:
        type: object
        properties:
          name:
            type: string
          code:
            type: string
          description:
            type: string
  ListingResponse:
    type: object
    properties:
      id:
        type: string
      title:
        type: string
        maxLength: 64
      description:
        type: string
      location:
        $ref: '#/definitions/Location'
      price:
        type: number
        format: double
        minimum: 10.00
      available:
        type: boolean
      thumbnail:
        type: string
        format: uri
      distance:
        type: number
        format: double
      created_at:
        type: string
        format: date-time
      max_guests:
        type: integer
        format: int32
      rating:
        type: number
        format: double
      instant_book:
        type: boolean
      active:
        type: boolean
      amenities:
        type: array
        items:
          type: string
      cancellation_policy:
        type: string
      category:
        type: object
      photos:
        type: array
        items:
          type: string
          format: uri
      host:
        type: object
      house_rules:
        type: array
        items:
          type: string
      updated_at:
        type: string
        format: date-time
  ListingWeatherResponse:
    type: object
    properties:
      id:
        type: string
        example: listing_123
      latitude:
        type: number
        format: float
        example: 40.7128
      longitude:
        type: number
        format: float
        example: -74.0060
      timezone:
        type: string
        example: Toronto/Ontario
      current:
        type: object
        properties:
          date:
            type: integer
            format: int64
            example: 1721253600
          humidity:
            type: integer
            example: 65
            description: Percentage (%)
          wind_speed:
            type: number
            format: float
            example: 13
            description: km/h
          feels_like:
            type: number
            format: float
            example: 299.15
            description: Celsius
          temp:
            type: number
            format: float
            example: 297.15
            description: Celsius
          visibility:
            type: integer
            example: 10000
            description: Meters
          air_quality:
            type: integer
            example: 36
      weather-forecast:
        type: array
        items:
          type: object
          properties:
            date:
              type: integer
              format: int64
              example: 1750128000
            temp:
              type: number
              format: float
              example: 297.15
  Booking:
    type: object
    properties:
      id:
        type: string
        example: "bkg_001"
      listing_id:
        type: string
        example: "lst_101"
      user_id:
        type: string
        example: "usr_201"
      check_in:
        type: string
        format: date-time
        example: "2025-06-01T14:00:00Z"
      check_out:
        type: string
        format: date-time
        example: "2025-06-05T11:00:00Z"
      amount:
        type: number
        format: float
        example: 500
      rating:
        type: number
        format: float
        example: 4.5
      days:
        type: integer
        example: 4
      payment_id:
        type: string
        example: "pay_001"
      status:
        type: string
        enum: [pending, accepted, rejected, cancelled, completed, awaiting_payment]
        example: "pending"
      guests:
        type: integer
        example: 2
  BookingRequest:
    type: object
    properties:
      listing_id:
        type: string
      user_id:
        type: string
      check_in:
        type: string
        format: date-time
      check_out:
        type: string
        format: date-time
      guests:
        type: integer
        format: int32
        maxLength: 3
        minimum: 1
    required:
      - listing_id
      - user_id
      - check_in
      - check_out
      - guests
  BookingResponse:
    type: object
    description: Response containing a single booking object.
    properties:
      success:
        type: boolean
        description: Indicates if the request was successful.
        example: true
      data:
        $ref: '#/definitions/Booking'
        description: The booking object returned by the API.
      toast:
        type: string
        description: Optional toast message for the client UI.
        example: "Booking created successfully."
      error:
        type: string
        description: Error message, if any.
        example: null
    required:
      - success
      - data

  BookingsResponse:
    type: object
    description: Paginated response containing a list of bookings.
    properties:
      success:
        type: boolean
        description: Indicates if the request was successful.
        example: true
      data:
        type: array
        description: List of booking objects.
        items:
          $ref: '#/definitions/Booking'
        example:
          - id: "bkg_001"
            listing_id: "lst_101"
            user_id: "usr_201"
            check_in: "2025-06-01T14:00:00Z"
            check_out: "2025-06-05T11:00:00Z"
            amount: 500
            rating: 4.5
            days: 4
            payment_id: "pay_001"
            status: "pending"
            guests: 2
      meta:
        type: object
        description: Pagination metadata.
        properties:
          page:
            type: integer
            description: Current page number
            example: 1
          limit:
            type: integer
            description: Number of items per page
            example: 10
          total:
            type: integer
            description: Total number of items
            example: 25
          pages:
            type: integer
            description: Total number of pages
            example: 3
        required:
          - page
          - limit
          - total
          - pages
      toast:
        type: string
        description: Optional toast message for the client UI.
        example: "Bookings retrieved successfully."
      error:
        type: string
        description: Error message, if any.
        example: null
    required:
      - success
      - data
      - meta

  AcceptBookingRequest:
    type: object
    properties:
      message:
        type: string
        description: Friendly message to the guest
    required:
      - message
  CancelBookingRequest:
    type: object
    properties:
      reason:
        type: string
        enum:
          - "Change of travel plans"
          - "Guest asked to cancel"
          - "Guest did not show up"
          - "Guest did not have required payment"
          - "Accidental booking"
          - "Other"
    required:
      - reason
  Review:
    type: object
    properties:
      id:
        type: string
      author:
        type: string
        description: The user writing the review
      target:
        type: string
        description: The user or listing being reviewed
      type:
        type: string
        enum:
          - user
          - listing
        description: Type of entity being reviewed
      category:
        type: string
      overall_rating:
        type: number
      comment:
        type: string
      emoji_sentiment:
        type: string
      metrics:
        type: object
        additionalProperties: true
      booking_id:
        type: string
      listing_id:
        type: string
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time
      status:
        type: string
      version:
        type: integer
      edit_history:
        type: array
        items:
          $ref: '#/definitions/ReviewEdit'
    required:
      - id
      - author
      - target
      - type
      - category
      - overall_rating
      - metrics
      - created_at
      - updated_at
      - status
      - version
      - edit_history
  ReviewRequest:
    type: object
    required:
      - author
      - target
      - type
      - category
      - overall_rating
      - metrics
    properties:
      author:
        type: string
        description: The user writing the review
      target:
        type: string
        description: The user or listing being reviewed
      type:
        type: string
        enum:
          - user
          - listing
        description: Type of entity being reviewed
      category:
        type: string
        description: Review context/category (e.g., couchsurf, workspace)
      overall_rating:
        type: number
        minimum: 1
        maximum: 5
      comment:
        type: string
        maxLength: 1000
      emoji_sentiment:
        type: string
        enum:
          - "👍"
          - "👎"
          - "👍👍"
      metrics:
        type: object
        description: Category-specific metrics (flexible)
        additionalProperties: true
      booking_id:
        type: string
        description: Associated booking ID if applicable
  ReviewEdit:
    type: object
    properties:
      version:
        type: integer
      updated_at:
        type: string
        format: date-time
      changes:
        type: object
        additionalProperties: true
    required:
      - version
      - updated_at
      - changes
  ReportReviewRequest:
    type: object
    required:
      - reason
      - reported_by
    properties:
      reason:
        type: string
        enum:
          - INAPPROPRIATE
          - MISLEADING
          - SPAM
          - OFFENSIVE
          - OTHER
      details:
        type: string
        maxLength: 500
        description: Additional details about the report
      reported_by:
        type: string
        description: User ID of the person reporting the review
  ReviewUpdateRequest:
    type: object
    properties:
      comment:
        type: string
        maxLength: 1000
      overall_rating:
        type: number
        minimum: 1
        maximum: 5
      emoji_sentiment:
        type: string
        enum:
          - "👍"
          - "👎"
          - "👍👍"
      metrics:
        type: object
        description: Category-specific metrics (flexible)
        additionalProperties: true
      # Only fields above are updatable. Author, target, and other identity fields are immutable.
  PaymentRequest:
    type: object
    properties:
      booking_id:
        type: string
      amount:
        type: number
        format: double
      currency:
        type: string
        maxLength: 3
      payment_method:
        type: string
        maxLength: 32
      payment_status:
        type: string
        maxLength: 32
      payment_date:
        type: string
        format: date-time
  PaymentResponse:
    type: object
    description: Response containing a single payment object.
    properties:
      success:
        type: boolean
        example: true
      data:
        $ref: '#/definitions/Payment'
        description: The payment object returned by the API.
      toast:
        type: string
        example: "Payment created successfully."
      error:
        type: string
        example: null
    required:
      - success
      - data
  PaymentMethodRequest:
    type: object
    properties:
      user_id:
        type: string
      payment_method:
        type: string
        maxLength: 32
      payment_method_type:
        type: string
        maxLength: 32
      payment_method_status:
        type: string
        maxLength: 32
      payment_method_date:
        type: string
        format: date-time
    required:
      - user_id
      - payment_method
  PaymentMethodResponse:
    type: object
    description: Response containing a single payment method object.
    properties:
      success:
        type: boolean
        example: true
      data:
        $ref: '#/definitions/PaymentMethod'
        description: The payment method object returned by the API.
      toast:
        type: string
        example: "Payment method added successfully."
      error:
        type: string
        example: null
    required:
      - success
      - data
  PaymentMethodsResponse:
    type: object
    description: Paginated response containing a list of payment methods.
    properties:
      success:
        type: boolean
        example: true
      data:
        type: array
        items:
          $ref: '#/definitions/PaymentMethod'
        description: List of payment methods.
      meta:
        type: object
        description: Pagination metadata.
        properties:
          page:
            type: integer
            example: 1
          limit:
            type: integer
            example: 10
          total:
            type: integer
            example: 25
          pages:
            type: integer
            example: 3
        required:
          - page
          - limit
          - total
          - pages
      toast:
        type: string
        example: "Payment methods retrieved successfully."
      error:
        type: string
        example: null
    required:
      - success
      - data
      - meta
  MessageRequest:
    type: object
    properties:
      listing_id:
        type: string
      booking_id:
        type: string
      message:
        type: string
      type:
        type: string
        maxLength: 32
    required:
      - message
  Message:
    type: object
    properties:
      id:
        type: string
      listing_id:
        type: string
      booking_id:
        type: string
      message:
        type: string
      type:
        type: string
        maxLength: 32
      created_at:
        type: string
        format: date-time
      updated_at:
        type: string
        format: date-time
  MessageResponse:
    type: object
    description: Response containing a single message object.
    properties:
      success:
        type: boolean
        description: Indicates if the request was successful.
        example: true
      data:
        $ref: '#/definitions/Message'
        description: The message object returned by the API.
      toast:
        type: string
        description: Optional toast message for the client UI.
        example: "Message sent successfully."
      error:
        type: string
        description: Error message, if any.
        example: null
    required:
      - success
      - data

  GetAllMessagesResponse:
    type: object
    description: Paginated response containing a list of messages.
    properties:
      success:
        type: boolean
        description: Indicates if the request was successful.
        example: true
      data:
        type: array
        description: List of message objects.
        items:
          $ref: '#/definitions/Message'
        example:
          - id: "msg_001"
            listing_id: "lst_101"
            booking_id: "bkg_001"
            message: "Hello!"
            type: "guest"
            created_at: "2025-06-01T14:00:00Z"
            updated_at: "2025-06-01T14:00:00Z"
      meta:
        type: object
        description: Pagination metadata.
        properties:
          page:
            type: integer
            description: Current page number
            example: 1
          limit:
            type: integer
            description: Number of items per page
            example: 10
          total:
            type: integer
            description: Total number of items
            example: 25
          pages:
            type: integer
            description: Total number of pages
            example: 3
        required:
          - page
          - limit
          - total
          - pages
      toast:
        type: string
        description: Optional toast message for the client UI.
        example: "Messages retrieved successfully."
      error:
        type: string
        description: Error message, if any.
        example: null
    required:
      - success
      - data
      - meta
  SearchListingSummary:
    type: object
    properties:
      id:
        type: string
      title:
        type: string
      price:
        type: number
        format: double
      location:
        $ref: '#/definitions/Location'
      thumbnail:
        type: string
        format: uri
      rating:
        type: number
        format: double
      category:
        type: object
        properties:
          name:
            type: string
          code:
            type: string
      available:
        type: boolean
      distance:
        type: number
        format: double
      instant_book:
        type: boolean
      short_description:
        type: string
    required:
      - id
      - title
      - price
      - location
      - thumbnail
      - available
  SearchListingsResponse:
    type: object
    properties:
      success:
        type: boolean
      toast:
        type: string
      data:
        type: array
        items:
          $ref: '#/definitions/SearchListingSummary'
      meta:
        type: object
        properties:
          page:
            type: integer
          limit:
            type: integer
          total:
            type: integer
          pages:
            type: integer
        required:
          - page
          - limit
          - total
          - pages
    required:
      - success
      - data
      - meta
  SearchListingsRequest:
    type: object
    properties:
      location:
        type: object
        properties:
          latitude:
            type: number
            format: double
          longitude:
            type: number
            format: double
          city:
            type: string
          country:
            type: string
      start_date:
        type: string
        format: date-time
      end_date:
        type: string
        format: date-time
      guests:
        type: integer
        format: int32
      price_min:
        type: number
        format: double
      price_max:
        type: number
        format: double
      instant_book:
        type: boolean
      category:
        type: string
      keywords:
        type: string
      gender:
        type: string
        description: Filter by host gender
      page:
        type: integer
        format: int32
      limit:
        type: integer
        format: int32
  DocumentRequest:
    type: object
    properties:
      type:
        type: string
        enum:
          - Listing
          - Avatar
          - Verification
          - Report
          - Messaging
        description: The type of document request. Must be one of the specified values.
      user_id:
        type: string
        description: The user's ID.
      documents:
        type: array
        items:
          type: object
          properties:
            content:
              type: string
              description: The content of the document.
            name:
              type: string
              description: The name of the document.
    required:
      - type
      - user_id
      - documents
  DocumentResponse:
    type: object
    description: Response containing a single document object.
    properties:
      success:
        type: boolean
        example: true
      data:
        $ref: '#/definitions/Document'
        description: The document object returned by the API.
      toast:
        type: string
        example: "Document uploaded successfully."
